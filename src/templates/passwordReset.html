<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Password reset</title>
  </head>
  <body style="margin:0;padding:0;background:#f8f7f2;font-family:Arial,sans-serif;color:#1c1917;">
    <div style="padding:32px 16px;">
      <div style="max-width:680px;margin:0 auto;background:#ffffff;border-radius:20px;padding:28px;border:1px solid #e7e5e4;">
        <p style="margin:0 0 8px;color:#7c3aed;font-size:12px;letter-spacing:0.24em;text-transform:uppercase;">CR Music</p>
        <h1 style="margin:0 0 12px;font-size:28px;line-height:1.2;">Reset your password</h1>
        <p style="margin:0 0 18px;font-size:15px;line-height:1.6;color:#57534e;">
          Hi {{customerName}}, we received a request to reset your password.
        </p>
        <p style="margin:0 0 18px;font-size:13px;line-height:1.6;color:#57534e;">
          Click the button below to reset it. If you didn’t request this, you can ignore this email.
        </p>
        <a href="{{resetUrl}}" style="display:inline-block;background:#7c3aed;color:#ffffff;text-decoration:none;padding:12px 18px;border-radius:999px;font-weight:700;">
          Reset Password
        </a>
      </div>
    </div>
  </body>
</html>
